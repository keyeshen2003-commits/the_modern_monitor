name: The Modern monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      push_test:
        description: "Send a test push instead of checking apartments"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      force_notify:
        description: "Push all current matching apartments, even if already seen"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: the-modern-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      WECHAT_PROVIDER: ${{ secrets.WECHAT_PROVIDER }}
      PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
      PUSHPLUS_CHANNEL: ${{ secrets.PUSHPLUS_CHANNEL }}
      PUSHPLUS_TEMPLATE: ${{ secrets.PUSHPLUS_TEMPLATE }}
      SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
      WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check The Modern availability
        run: |
          if [ "${{ github.event.inputs.push_test || 'false' }}" = "true" ]; then
            python monitor.py --push-test
          elif [ "${{ github.event.inputs.force_notify || 'false' }}" = "true" ]; then
            python monitor.py --push --force-notify
          else
            python monitor.py --push
          fi
      - name: Save notification state
        if: ${{ github.event.inputs.push_test != 'true' }}
        run: |
          git config user.name "the-modern-monitor"
          git config user.email "the-modern-monitor@users.noreply.github.com"
          if git diff --quiet -- data/state.json; then
            echo "No state changes to save."
            exit 0
          fi
          cp data/state.json /tmp/the-modern-state.json
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/the-modern-state.json data/state.json
          git add data/state.json
          git diff --cached --quiet || git commit -m "Update The Modern monitor state [skip ci]"
          git push
